server {
    listen 80;
    server_name zvirycholeksandr.com.ua www.zvirycholeksandr.com.ua;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zvirycholeksandr.com.ua www.zvirycholeksandr.com.ua;

    ssl_certificate     /etc/letsencrypt/live/zvirycholeksandr.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zvirycholeksandr.com.ua/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Static files — serve directly (cache 30 days)
    # ВАЖЛИВО: замінити шлях на реальний де лежить frontend на сервері
    location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|webp|ico|gif)$ {
        root /var/www/mycv/zvirycholeksandr/frontend;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API
    location /api/ {
        proxy_pass         http://127.0.0.1:1995;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 20M;
    }

    # Все інше — через Node.js (включно з адмінкою та статикою)
    location / {
        proxy_pass         http://127.0.0.1:1995;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
