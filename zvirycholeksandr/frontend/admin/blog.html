<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Блог — Адмінка</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css?v=3">
</head>
<body>
<div class="admin-layout">

  <!-- MOBILE TOPBAR -->
  <div class="admin-topbar">
    <button class="admin-burger" id="admin-burger">&#9776;</button>
    <span class="admin-topbar-logo">zviry<span>ch</span>oleksandr</span>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- SIDEBAR -->
  <aside class="admin-sidebar">
    <div class="sidebar-logo">zviry<span>ch</span>oleksandr</div>
    <nav class="sidebar-nav">
      <a href="/admin/index">
        <span class="nav-icon">📋</span> Замовлення
      </a>
      <a href="/admin/portfolio">
        <span class="nav-icon">🖼️</span> Портфоліо
      </a>
      <a href="/admin/blog" class="active">
        <span class="nav-icon">📝</span> Блог
      </a>
      <a href="/admin/stats">
        <span class="nav-icon">📊</span> Статистика
      </a>
      <a href="/admin/settings">
        <span class="nav-icon">⚙️</span> Налаштування
      </a>
      <a href="/" target="_blank">
        <span class="nav-icon">🌐</span> Сайт
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-logout" id="logout-btn">Вийти</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="admin-main">
    <div class="admin-header">
      <h1>Блог</h1>
      <p>Управління статтями блогу</p>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <div class="table-toolbar">
        <span class="table-title">Всі статті</span>
        <button class="btn btn-primary btn-sm" onclick="openAddBlog()">+ Нова стаття</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Заголовок</th>
            <th>Дата</th>
            <th>Статус</th>
            <th>Дії</th>
          </tr>
        </thead>
        <tbody id="blog-tbody">
          <tr><td colspan="4" style="text-align:center;padding:2rem;color:#888">Завантаження...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- BLOG MODAL -->
<div class="modal-overlay" id="blog-modal">
  <div class="modal" style="max-width:720px">
    <div class="modal-header">
      <span class="modal-title" id="blog-modal-title">Нова стаття</span>
      <button class="modal-close" onclick="closeModal('blog-modal')">✕</button>
    </div>
    <div class="modal-body">
      <form id="blog-form" onsubmit="saveBlogPost(event)">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group">
            <label class="form-label">Slug (URL) *</label>
            <input type="text" name="slug" class="form-control" required
              placeholder="yak-zrobyty-lending">
          </div>
          <div class="form-group">
            <label class="form-label">Теги (через кому)</label>
            <input type="text" name="tags" class="form-control" placeholder="лендінг, SEO">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Заголовок *</label>
          <input type="text" name="title" class="form-control" required
            placeholder="Як зробити лендінг для масажиста">
        </div>
        <div class="form-group">
          <label class="form-label">Короткий опис (excerpt)</label>
          <textarea name="excerpt" class="form-control" rows="2"
            placeholder="Розбираємо структуру продаючого сайту..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Контент (Markdown)</label>
          <div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.5rem">
            <button type="button" class="btn btn-secondary btn-sm" onclick="mdInsert('**','**','жирний')">B</button>
            <button type="button" class="btn btn-secondary btn-sm" onclick="mdInsert('*','*','курсив')" style="font-style:italic">I</button>
            <button type="button" class="btn btn-secondary btn-sm" onclick="mdInsert('\n## ','','Заголовок')">H2</button>
            <button type="button" class="btn btn-secondary btn-sm" onclick="mdInsert('\n### ','','Підзаголовок')">H3</button>
            <button type="button" class="btn btn-secondary btn-sm" onclick="mdInsertLink()">🔗 Посилання</button>
            <button type="button" class="btn btn-secondary btn-sm" onclick="mdInsert('\n- ','','пункт')">• Список</button>
            <button type="button" class="btn btn-secondary btn-sm" onclick="mdInsert('\n> ','','цитата')">❝ Цитата</button>
            <button type="button" class="btn btn-secondary btn-sm" onclick="mdInsert('\n---\n','','')">— Розділ</button>
          </div>
          <textarea name="content" id="md-content" class="form-control md-editor" rows="15"
            placeholder="## Заголовок&#10;&#10;Текст статті у форматі Markdown...&#10;&#10;[Назва посилання](https://example.com)"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Обкладинка</label>
          <div class="upload-area" onclick="this.nextElementSibling.click()">
            📁 Клікніть для вибору обкладинки (до 5 МБ)
          </div>
          <input type="file" name="cover" accept="image/*" style="display:none"
            onchange="document.getElementById('cover-preview').src = URL.createObjectURL(this.files[0])">
          <img id="cover-preview" class="upload-preview" src="" alt=""
            style="max-width:300px;display:none;margin-top:.5rem"
            onerror="this.style.display='none'" onload="this.style.display='block'">
        </div>
        <div class="form-check">
          <input type="checkbox" name="isPublished" id="isPublished">
          <label for="isPublished" style="font-size:.875rem">Опублікувати статтю</label>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('blog-modal')">Скасувати</button>
      <button class="btn btn-primary" onclick="document.getElementById('blog-form').requestSubmit()">Зберегти</button>
    </div>
  </div>
</div>

<script src="/js/admin.js"></script>
<script>
function getContentEl() {
  return document.getElementById('md-content') || document.querySelector('[name="content"]');
}
function mdInsert(before, after, placeholder) {
  const ta = getContentEl();
  const start = ta.selectionStart, end = ta.selectionEnd;
  const sel = ta.value.substring(start, end) || placeholder;
  ta.value = ta.value.substring(0, start) + before + sel + after + ta.value.substring(end);
  ta.focus();
  ta.selectionStart = start + before.length;
  ta.selectionEnd   = start + before.length + sel.length;
}
function mdInsertLink() {
  const ta = getContentEl();
  const start = ta.selectionStart, end = ta.selectionEnd;
  const sel = ta.value.substring(start, end);
  const url = prompt('URL посилання:', 'https://');
  if (!url) return;
  const text = sel || prompt('Текст посилання:', 'Назва') || 'Посилання';
  const md = `[${text}](${url})`;
  ta.value = ta.value.substring(0, start) + md + ta.value.substring(end);
  ta.focus();
}
</script>
</body>
</html>
